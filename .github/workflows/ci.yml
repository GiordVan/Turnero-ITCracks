name: CI

on:
  push:
    branches: [main, 'feat/**']
  pull_request:

jobs:
  backend:
    name: Backend (lint · unit · integración · build)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: turnero
          POSTGRES_PASSWORD: turnero
          POSTGRES_DB: turnero_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U turnero"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://turnero:turnero@localhost:5432/turnero_test?schema=public
      JWT_SECRET: ci-jwt-secret-not-real-at-least-32-chars-long
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Instalación reproducible
        run: npm ci
      - name: Prisma Client
        run: npx prisma generate
      - name: Lint (gate obligatorio)
        run: npm run lint
      - name: Tests unitarios
        run: npm test
      - name: Migraciones sobre DB de testing
        run: npx prisma migrate deploy
      - name: Tests de integración
        run: npm run test:integration
      - name: Prettier (informativo, NO bloqueante — baseline pendiente)
        run: npm run format:check
        continue-on-error: true

  frontend:
    name: Frontend (lint · build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Instalación reproducible
        run: npm ci
      - name: Lint (gate obligatorio)
        run: npm run lint
      - name: Build de producción
        run: npm run build
